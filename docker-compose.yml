# docker-compose.yml
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://bambu:${POSTGRES_PASSWORD}@postgres:5432/bambu_genius
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # 必填：告知 SvelteKit 实际访问地址，否则 adapter-node 会把协议猜成 https
      - ORIGIN=${ORIGIN}
      # 可选：若部署环境需要代理才能访问 makerworld.com.cn，取消注释并填入代理地址
      # - HTTPS_PROXY=http://your-proxy:port
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=bambu_genius
      - POSTGRES_USER=bambu
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bambu -d bambu_genius"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="icon" href="/icon.svg" type="image/svg+xml" />

    %sveltekit.head%

  <body data-sveltekit-preload-data="hover">

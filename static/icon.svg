<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1e1060"/>
      <stop offset="100%" stop-color="#0a0820"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="88" cy="72" r="3.5" fill="#67e8f9" opacity="0.8"/>
  <circle cx="424" cy="88" r="2.5" fill="white" opacity="0.65"/>
  <circle cx="356" cy="46" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="152" cy="116" r="2" fill="white" opacity="0.55"/>
  <circle cx="464" cy="156" r="2" fill="#67e8f9" opacity="0.5"/>
  <circle cx="68" cy="180" r="1.8" fill="white" opacity="0.4"/>
  <!-- Printer frame -->
  <rect x="112" y="188" width="288" height="180" rx="24" fill="#0e1a2e" stroke="#1e3a5f" stroke-width="3"/>
  <!-- Gantry rail -->
  <rect x="136" y="224" width="240" height="12" rx="6" fill="#1e3a5f"/>
  <!-- Print head -->
  <rect x="214" y="210" width="84" height="58" rx="14" fill="#0c4a6e"/>
  <rect x="214" y="210" width="84" height="58" rx="14" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <!-- Nozzle -->
  <rect x="247" y="268" width="18" height="26" rx="7" fill="#22d3ee"/>
  <!-- Print bed -->
  <rect x="152" y="322" width="208" height="26" rx="10" fill="#0a1628" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Printed object layers -->
  <rect x="198" y="298" width="116" height="26" rx="6" fill="#0ea5e9" opacity="0.25"/>
  <rect x="212" y="280" width="88" height="20" rx="5" fill="#0ea5e9" opacity="0.45"/>
  <rect x="226" y="266" width="60" height="16" rx="4" fill="#22d3ee" opacity="0.75"/>
  <!-- Filament strand -->
  <line x1="256" y1="294" x2="256" y2="268" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
  <!-- Left spool -->
  <circle cx="144" cy="214" r="20" fill="#0e1a2e" stroke="#a78bfa" stroke-width="3"/>
  <circle cx="144" cy="214" r="9" fill="none" stroke="#a78bfa" stroke-width="2.5"/>

  <rect x="112" y="364" width="288" height="5" rx="2.5" fill="#22d3ee" opacity="0.65"/>
  <!-- BG label -->
  <text x="256" y="452" font-size="58" font-weight="900" font-family="Arial, sans-serif" text-anchor="middle" fill="#22d3ee" letter-spacing="5">BG</text>
</svg>
